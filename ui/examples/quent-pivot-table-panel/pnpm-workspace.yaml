# Nested workspace for this example. The root `ui/pnpm-workspace.yaml`
# intentionally excludes `examples/*` so the main UI build/install does not
# pull in `@grafana/*` and friends. Running `pnpm install` from this folder
# uses this file instead.
#
# IMPORTANT: do NOT add `../../packages/@quent/*` here. The `@quent/*`
# packages are referenced via `link:` from this example's `package.json`
# instead. If they were workspace members of *this* workspace, pnpm would
# re-resolve their peer deps (React, @tanstack/*, etc.) against the
# example's lockfile (Grafana 12 → React 18, older @tanstack) and overwrite
# the symlinks under `ui/packages/@quent/*/node_modules/` that the root
# `ui/` install put there — silently breaking `pnpm typecheck` from `ui/`
# until those node_modules are blown away. With `link:`, pnpm never visits
# the source dirs from this workspace, so they stay exactly as the root
# install left them.
packages:
  - .

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  protobufjs: true

# `@grafana/ui` transitively pulls a fork of `react-data-grid` from git;
# pnpm 11 blocks exotic subdeps by default. Allow them here so the install
# completes inside this example's workspace.
blockExoticSubdeps: false
