name: UI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui routes:generate
      - run: pixi run pnpm --dir ui lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui routes:generate
      - run: pixi run pnpm --dir ui test:coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ui-test-results
          path: |
            ui/junit.xml
            ui/coverage/

  e2e:
    name: UI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui exec playwright install --with-deps chromium
      - run: pixi run pnpm --dir ui test:e2e
        env:
          PLAYWRIGHT_CARGO_COMMAND: pixi run cargo
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: ui-e2e-failure-report
          path: |
            ui/playwright-report/
            ui/test-results/
          if-no-files-found: warn
          retention-days: 7

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui audit

  build:
    name: Build
    needs: [fmt, lint, typecheck, test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true
      - run: pixi run pnpm --dir ui install --frozen-lockfile
      - run: pixi run pnpm --dir ui build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 7
