name: Rust

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.proto"
      - "pixi.toml"
      - ".github/workflows/rust.yml"
      - "deny.toml"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/*.proto"
      - "pixi.toml"
      - ".github/workflows/rust.yml"
      - "deny.toml"

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .pixi/
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: ${{ runner.os }}-pixi-
      - run: pixi install
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: pixi run cargo fmt --all -- --check
      - run: pixi run cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: pixi run cargo test --workspace --all-features --locked --all-targets
      - run: pixi run cargo build --workspace --all-features --locked --release

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - run: rustup toolchain install stable --profile minimal
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: cargo-deny-cache
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.0
      - if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.0
      - run: cargo deny check
